\<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CS2 USP-S DEBUG</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; color: white; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">Ładowanie USP-S... (Sprawdź F12 jeśli nic nie widzisz)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 0, 5); // Odsunięcie kamery, żeby na pewno widzieć model

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // MOCNE ŚWIATŁO Z KAŻDEJ STRONY (żeby nie było ciemno)
        const ambient = new THREE.AmbientLight(0xffffff, 2);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.position.set(5, 5, 5);
        scene.add(sun);

        const controls = new OrbitControls(camera, renderer.domElement);

        const loader = new GLTFLoader();
        
        // SPRÓBUJ ZAŁADOWAĆ MODEL
        loader.load('./scene.gltf', (gltf) => {
            const model = gltf.scene;
            
            // AUTOMATYCZNE SKALOWANIE (naprawia problem "za mały/za duży")
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3()).length();
            const center = box.getCenter(new THREE.Vector3());

            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);
            
            // Ustawia kamerę idealnie przed modelem
            camera.position.copy(center);
            camera.position.x += size / 2.0;
            camera.position.y += size / 5.0;
            camera.position.z += size / 2.0;
            camera.lookAt(center);

            scene.add(model);
            document.getElementById('info').innerHTML = "USP-S ZAŁADOWANY! Obracaj myszką.";
            console.log("Model loaded successfully");
        }, 
        (xhr) => {
            console.log((xhr.loaded / xhr.total * 100) + '% loaded');
        },
        (error) => {
            console.error("BŁĄD:", error);
            document.getElementById('info').innerHTML = "BŁĄD ŁADOWANIA! Sprawdź czy plik nazywa się scene.gltf";
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
