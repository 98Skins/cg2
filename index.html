<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CS2 USP-S Showcase</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #viewer { width: 100vw; height: 100vh; }
        .ui {
            position: absolute; top: 40px; left: 40px;
            color: white; border-left: 6px solid #ff9f43;
            padding-left: 20px; pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .controls {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1 style="margin:0; font-size: 32px;">USP-S | TACTICAL</h1>
        <p style="margin:5px 0; letter-spacing: 2px;">COUNTER-STRIKE 2 ASSET VIEW</p>
    </div>

    <div class="controls">Myszka: Obracaj i Przybliżaj</div>
    <div id="viewer"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0.4, 0.1, 0.6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('viewer').appendChild(renderer.domElement);

        // Oświetlenie studyjne
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const topLight = new THREE.DirectionalLight(0xffffff, 2);
        topLight.position.set(1, 2, 1);
        scene.add(topLight);

        // Niebieska kontra (styl CS2)
        const blueLight = new THREE.PointLight(0x00ffff, 5);
        blueLight.position.set(-2, 1, 0);
        scene.add(blueLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true; // Efekt inspekcji
        controls.autoRotateSpeed = 2.0;

        const loader = new GLTFLoader();
        
        // Ładowanie modelu z Twojego folderu
        loader.load('./scene.gltf', (gltf) => {
            const model = gltf.scene;
            
            // Centrowanie modelu w osiach
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            scene.add(model);
        }, undefined, (error) => {
            console.error("Błąd ładowania! Sprawdź czy pliki są w tym samym folderze na GitHubie.", error);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
