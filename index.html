<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CS2 Tactical Map 3D</title>
    <style>
        body { margin: 0; background: #0b0e11; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 20px; border-left: 4px solid #ff9f43;
            pointer-events: none; border-radius: 0 8px 8px 0;
        }
        .controls-hint {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: rgba(255,255,255,0.5); font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin:0">OPERACJA: GITHUB</h2>
        <p style="margin:5px 0; font-size: 14px; opacity: 0.7;">Model: FPS MAP 0088</p>
    </div>

    <div class="controls-hint">LPM: Obracanie | PPM: Przesuwanie | Scroll: Przybliżanie</div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        // Kamera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 20, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Oświetlenie - kluczowe dla wyglądu modelu
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // Kontrole myszy
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Ładowanie modelu (Zmień 'scene.gltf' na nazwę swojego pliku)
        const loader = new GLTFLoader();
        loader.load('scene.gltf', (gltf) => {
            scene.add(gltf.scene);
            
            // Centrowanie modelu
            const box = new THREE.Box3().setFromObject(gltf.scene);
            const center = box.getCenter(new THREE.Vector3());
            gltf.scene.position.sub(center);
            
            console.log("Model załadowany pomyślnie!");
        }, undefined, (error) => {
            console.error("Błąd ładowania modelu. Upewnij się, że pliki są na serwerze/GitHubie.", error);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
